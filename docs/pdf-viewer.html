<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>PDF Viewer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #f5f5f5;
      height: 100%;
    }
    #viewer {
      width: 100%;
      height: 100vh;
      border: none;
      display: block;
    }
  </style>
</head>
<body>
  <iframe
    id="viewer"
    src="https://mozilla.github.io/pdf.js/web/viewer.html?file="
    title="PDF Viewer">
  </iframe>

  <script>
    const pdfPath = window.location.origin + window.location.pathname.replace(/\/[^\/]*$/, '/') + "files/resume.pdf";
    document.getElementById("viewer").src =
      "https://mozilla.github.io/pdf.js/web/viewer.html?file=" + encodeURIComponent(pdfPath);
  </script>
</body>
</html>
